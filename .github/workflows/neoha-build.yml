# See https://github.com/actions/setup-go
name: NeoHA Build
on: [push, pull_request]
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          # go-version: 1.20.10
          # go-version: '>=1.20.5'
          go-version: '1.20'
        id: go

      - name: Check out code
        uses: actions/checkout@v4

      - name: Build
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          make build
