# See https://github.com/actions/setup-go
name: NeoHA Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: neoha-test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Unit test
        # Integration tests (MySQL/Xtrabackup/SSH) are manual-only; see test/integration/README.md
        run: |
          export TERM=xterm
          export PATH="$PATH:$(go env GOPATH)/bin"
          make test
